<div class="details-section" [class]="(isDarkMode | async) ? 'dark-theme' : ''">
  <div class="actions full-width">
    <input
      type="file"
      [accept]=""
      #fileInput
      (change)="fileUpload($event)"
      style="display: none" />
    <button
      type="button"
      mat-flat-button
      class="save-btn"
      (click)="fileInput.click()"
      [disabled]="!storageServiceId">
      {{ 'desktopFile' | transloco }}
    </button>
    <button
      type="button"
      mat-flat-button
      class="save-btn"
      (click)="githubImport()"
      [disabled]="!storageServiceId">
      {{ 'githubFile' | transloco }}
    </button>
  </div>
  <mat-checkbox [(ngModel)]="checked"> Add path to file</mat-checkbox>
  <ng-container *ngIf="checked">
    <mat-form-field
      *ngIf="!storageServiceId || !storageServiceId.getRawValue()"
      class="full-width"
      subscriptSizing="dynamic">
      <mat-label>{{ 'path' | transloco }}</mat-label>
      <input matInput [formControl]="storagePath" />
    </mat-form-field>
  </ng-container>

  <div
    class="actions"
    *ngIf="storageServiceId.getRawValue() && !hideScmActions">
    <button
      mat-flat-button
      color="primary"
      type="button"
      (click)="viewLatest()"
      [disabled]="!storageServiceId || !storageServiceId.getRawValue()">
      {{ 'scripts.viewLatest' | transloco }}
    </button>
    <button
      *ngIf="cache"
      mat-flat-button
      color="primary"
      type="button"
      (click)="deleteCache()">
      {{ 'scripts.deleteCache' | transloco }}
    </button>
  </div>
  <div class="content">
    <span *ngIf="isScript">Script Contents</span>
    <div class="script-editor-snapshot-banner" *ngIf="showSnapshotBanner">
      <mat-icon class="snapshot-icon">history</mat-icon>
      <div class="snapshot-message">
        <span class="snapshot-text" *ngIf="snapshotDisplayDate as snap">
          Snapshot from {{ snap | date: 'medium' }} — the running script uses
          whatever is currently in the linked storage.
        </span>
        <span class="snapshot-text" *ngIf="!snapshotDisplayDate">
          Snapshot — the running script uses whatever is currently in the linked
          storage.
        </span>
        <span class="snapshot-error" *ngIf="refreshError">
          {{ refreshError }}
        </span>
      </div>
      <button
        mat-stroked-button
        color="primary"
        type="button"
        class="snapshot-refresh-btn"
        (click)="viewLatest()">
        <mat-icon>refresh</mat-icon>
        Refresh
      </button>
    </div>
    <df-ace-editor
      class="full-width"
      [formControl]="content"
      [mode]="type.getRawValue()"></df-ace-editor>
  </div>
</div>
